<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Ajouter un Statut</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-plus-circle"></i> Ajouter un Statut</h2>
        <a th:href="@{/demande-status}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Retour
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <i class="bi bi-clock-history"></i> Nouveau Statut
                </div>
                <div class="card-body">
                    <form th:action="@{/demande-status/save}" method="post">
                        
                        <!-- Demande -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-file-text"></i> Demande *
                            </label>
                            <select name="demandeId" class="form-select" required
                                    onchange="afficherInfoDemande(this)">
                                <option value="">-- Sélectionner --</option>
                                <option th:each="d : ${demandes}"
                                        th:value="${d.id}"
                                        th:text="'#' + ${d.id} + ' - ' + ${d.client.nom} + ' (' + ${d.lieu} + ')'"
                                        th:selected="${selectedDemandeId != null && selectedDemandeId == d.id}"
                                        th:data-client="${d.client.nom}"
                                        th:data-lieu="${d.lieu}"
                                        th:data-district="${d.district}"
                                        th:data-statut="${d.dernierStatusLibelle}">
                                </option>
                            </select>
                        </div>
                        
                        <!-- Info demande -->
                        <div id="infoBox" class="alert alert-info mb-3" style="display:none;">
                            <div class="row">
                                <div class="col-6">
                                    <small class="text-muted">Client</small><br>
                                    <strong id="infoClient">-</strong>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted">Lieu</small><br>
                                    <strong id="infoLieu">-</strong>
                                </div>
                            </div>
                            <hr class="my-2">
                            <div class="row">
                                <div class="col-6">
                                    <small class="text-muted">District</small><br>
                                    <strong id="infoDistrict">-</strong>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted">Statut actuel</small><br>
                                    <span class="badge bg-info" id="infoStatut">-</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Status -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-flag"></i> Nouveau Statut *
                            </label>
                            <select name="statusId" class="form-select" required>
                                <option value="">-- Sélectionner --</option>
                                <option th:each="s : ${statuses}"
                                        th:value="${s.id}"
                                        th:text="${s.libelle}"></option>
                            </select>
                        </div>
                        
                        <!-- Commentaire -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-chat-text"></i> Commentaire
                            </label>
                            <textarea name="commentaire" class="form-control" rows="3"
                                      placeholder="Commentaire (optionnel)..."></textarea>
                        </div>
                        
                        <!-- Info durées -->
                        <div class="alert alert-light">
                            <i class="bi bi-info-circle"></i>
                            Les durées (estimée et réelle) seront calculées automatiquement
                            par rapport au dernier statut de la demande.
                        </div>
                        
                        <!-- Boutons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Enregistrer
                            </button>
                            <a th:href="@{/demande-status}" class="btn btn-secondary">
                                <i class="bi bi-x"></i> Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    function afficherInfoDemande(select) {
        const box = document.getElementById('infoBox');
        if (!select.value) { box.style.display = 'none'; return; }
        
        const opt = select.options[select.selectedIndex];
        document.getElementById('infoClient').textContent   = opt.dataset.client   || '-';
        document.getElementById('infoLieu').textContent     = opt.dataset.lieu     || '-';
        document.getElementById('infoDistrict').textContent = opt.dataset.district || '-';
        document.getElementById('infoStatut').textContent   = opt.dataset.statut   || '-';
        box.style.display = 'block';
    }
    
    window.addEventListener('DOMContentLoaded', function() {
        const s = document.querySelector('select[name="demandeId"]');
        if (s && s.value) afficherInfoDemande(s);
    });
</script>
</body>
</html>
