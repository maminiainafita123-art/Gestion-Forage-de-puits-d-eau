<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Historique des Statuts</title>
    <style>
        .niveau-eleve { 
            background-color: #fff3cd !important;
            border-left: 4px solid #ffc107;
        }
        .niveau-critique { 
            background-color: #f8d7da !important;
            border-left: 4px solid #dc3545;
        }
        .badge-eleve { background-color: #ffc107 !important; color: #333 !important; }
        .badge-critique { 
            background-color: #dc3545 !important; 
            color: white !important;
            animation: pulse 1.5s infinite;
        }
        .badge-normal { background-color: #28a745 !important; color: white !important; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clock-history"></i> Historique des Statuts - <b>3502</b></h2>
        <a th:href="@{/demande-status/new}" class="btn btn-primary">
            <i class="bi bi-plus"></i> Ajouter
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Demande</th>
                        <th>Client</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Durée Estimée</th>
                        <th>Durée Réelle</th>
                        <th>Niveau</th>
                        <th>Commentaire</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ds : ${demandeStatuses}"
                        th:classappend="${ds.critique} ? 'niveau-critique' : (${ds.eleve} ? 'niveau-eleve' : '')">
                        
                        <td th:text="${ds.id}"></td>
                        <td>
                            #<span th:text="${ds.demande.id}"></span>
                            - <span th:text="${ds.demande.lieu}"></span>
                        </td>
                        <td th:text="${ds.demande.client.nom}"></td>
                        <td>
                            <span class="badge bg-info" th:text="${ds.status.libelle}"></span>
                        </td>
                        <td th:text="${#temporals.format(ds.dateStatus, 'dd/MM/yyyy HH:mm')}"></td>
                        
                        <!-- Durée Estimée -->
                        <td>
                            <span class="text-primary">
                                <i class="bi bi-clock"></i>
                                <span th:text="${ds.dureeEstimer}"></span>h
                            </span>
                        </td>
                        
                        <!-- Durée Réelle -->
                        <td>
                            <span class="text-success">
                                <i class="bi bi-briefcase"></i>
                                <span th:text="${ds.dureeReel}"></span>h
                                <small class="text-muted" 
                                       th:text="'(' + ${ds.dureeReel / 8} + 'j ' + ${ds.dureeReel % 8} + 'h)'">
                                </small>
                            </span>
                        </td>
                        
                        <!-- Niveau Indicateur -->
                        <td>
                            <!-- Normal -->
                            <span th:if="${ds.normal}" class="badge badge-normal">
                                <i class="bi bi-check-circle"></i> Normal
                            </span>
                            
                            <!-- Élevé -->
                            <span th:if="${ds.eleve}" class="badge badge-eleve">
                                <i class="bi bi-exclamation-triangle"></i> Élevé
                                <br>
                                <small th:if="${ds.indicateur != null}" 
                                       th:text="${ds.plageIndicateur}"></small>
                            </span>
                            
                            <!-- Critique -->
                            <span th:if="${ds.critique}" class="badge badge-critique">
                                <i class="bi bi-x-octagon"></i> CRITIQUE
                                <br>
                                <small th:if="${ds.indicateur != null}" 
                                       th:text="${ds.plageIndicateur}"></small>
                            </span>
                        </td>
                        
                        <td>
                            <small th:text="${ds.commentaire != null ? ds.commentaire : '-'}"></small>
                        </td>
                        <td>
                            <a th:href="@{/demande-status/{id}/edit(id=${ds.id})}"
                               class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/demande-status/{id}/delete(id=${ds.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Supprimer ?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(demandeStatuses)}">
                        <td colspan="10" class="text-center text-muted py-4">
                            Aucun historique
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
