<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Statut : <span th:text="${libelleStatus}"></span></title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="bi bi-tag"></i> 
            Demandes - Statut : 
            <span class="badge bg-primary fs-4" th:text="${libelleStatus}"></span>
        </h2>
        <a th:href="@{/}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Retour
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Demande</th>
                        <th>Client</th>
                        <th>Date statut</th>
                        <th>Commentaire</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ds,iterStat : ${statuslister}">
                        <td th:text="${iterStat.count}">1</td>
                        <td>
                            <strong>#<span th:text="${ds.demande.id}"></span></strong><br>
                            <small th:text="${ds.demande.lieu}"></small>
                        </td>
                        <td th:text="${ds.demande.client?.nom}">Client</td>
                        <td th:text="${#temporals.format(ds.dateStatus, 'dd/MM/yyyy')}">Date</td>
                        <td th:text="${ds.commentaire != null ? ds.commentaire : '-'}">Commentaire</td>
                        <td>
                            <a th:href="@{/demandes/{id}(id=${ds.demande.id})}" 
                               class="btn btn-sm btn-info">
                                <i class="bi bi-eye"></i> Voir
                            </a>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(statuslister)}">
                        <td colspan="6" class="text-center py-4">
                            Aucune demande avec le statut "<strong th:text="${libelleStatus}"></strong>"
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
