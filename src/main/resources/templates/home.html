<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Accueil</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">Tableau de bord</h2>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-people"></i> Clients</h5>
                    <h2 th:text="${nbClients}">0</h2>
                    <a th:href="@{/clients}" class="text-white">Voir tout →</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-file-text"></i> Demandes</h5>
                    <h2 th:text="${nbDemandes}">0</h2>
                    <a th:href="@{/demandes}" class="text-white">Voir tout →</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-receipt"></i> Devis</h5>
                    <h2 th:text="${nbDevis}">0</h2>
                    <a th:href="@{/devis}" class="text-white">Voir tout →</a>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
    <div class="col-md-4">
        <a th:href="@{/demande-status/créé}" class="text-decoration-none">
            <div class="card bg-secondary text-white hover-shadow">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-plus-circle"></i> Status Créé</h5>
                    <h2 th:text="${statusCree}">0</h2>
                    <small>Demandes au statut créé</small>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a th:href="@{/demande-status/forage}" class="text-decoration-none">
            <div class="card bg-danger text-white hover-shadow">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-geo-alt"></i> Status Forage</h5>
                    <h2 th:text="${statusForage}">0</h2>
                    <small>Demandes au statut forage</small>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a th:href="@{/demande-status/étude}" class="text-decoration-none">
            <div class="card bg-dark text-white hover-shadow">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-mortarboard"></i> Status Étude</h5>
                    <h2 th:text="${statusEtude}">0</h2>
                    <small>Demandes au statut étude</small>
                </div>
            </div>
        </a>
    </div>
</div>

    <div class="col-md-12">
            <div class="card bg-warning text-dark">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-calculator"></i> Chiffre d'Affaire Total</h5>
                    <h2 th:text="${ChiffreAffaire}">0</h2>
                    <small>Montant des devis</small>
                </div>
            </div>
        </div>
</div>

<!-- Ajoutez ce CSS pour l'effet hover (optionnel) -->
<style>
    .hover-shadow {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hover-shadow:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
</style>
</div>
</body>
</html>
