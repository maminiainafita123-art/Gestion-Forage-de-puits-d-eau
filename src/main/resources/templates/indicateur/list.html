<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Indicateurs</title>
    <style>
        .badge-eleve { background-color: #ffc107 !important; color: #333 !important; }
        .badge-critique { background-color: #dc3545 !important; color: white !important; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-speedometer2"></i> Indicateurs</h2>
        <a th:href="@{/indicateurs/new}" class="btn btn-primary">
            <i class="bi bi-plus"></i> Nouvel Indicateur
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Status Début</th>
                        <th>Status Fin</th>
                        <th>Niveau</th>
                        <th>Plage (heures)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="indic : ${indicateurs}">
                        <td th:text="${indic.id}"></td>
                        <td>
                            <span class="badge bg-secondary" 
                                  th:text="${indic.statusDebut.libelle}"></span>
                        </td>
                        <td>
                            <span class="badge bg-secondary" 
                                  th:text="${indic.statusFin.libelle}"></span>
                        </td>
                        <td>
                            <span th:if="${indic.level == 'eleve'}" class="badge badge-eleve">
                                <i class="bi bi-exclamation-triangle"></i> Élevé
                            </span>
                            <span th:if="${indic.level == 'critique'}" class="badge badge-critique">
                                <i class="bi bi-x-octagon"></i> Critique
                            </span>
                        </td>
                        <td>
                            <span th:text="${indic.heure1}"></span>h
                            → <span th:text="${indic.heure2}"></span>h
                        </td>
                        <td>
                            <a th:href="@{/indicateurs/{id}/edit(id=${indic.id})}"
                               class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/indicateurs/{id}/delete(id=${indic.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Supprimer ?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(indicateurs)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            Aucun indicateur
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
