<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List des demande du Clients - Demande</title>
</head>
<body>
    <h1>List des demande du Clients</h1>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Type de Forage</th>
                <th>Profondeur</th>
                <th>Localisation</th>
                <th>Statut</th>
                <th>Date de Création</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="demande : ${demandes}">
                <td th:text="${demande.id}">1</td>
                <td th:text="${demande.typeForage}">Type de Forage</td>
                <td th:text="${demande.profondeur}">Profondeur</td>
                <td th:text="${demande.localisation}">Localisation</td>
                <td th:text="${demande.statut}">Statut</td>
                <td th:text="${#dates.format(demande.dateCreation, 'dd/MM/yyyy')}">Date de Création</td>
                <td>
                    <a th:href="@{/demandes/{id}/edit(id=${demande.id})}">Modifier</a>
                    <a th:href="@{/demandes/{id}/delete(id=${demande.id})}" onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette demande ?');">Supprimer</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
