<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Détail Demande</title>
    
    <style>
        .timeline {
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-text"></i> Demande #<span th:text="${demande.id}"></span></h2>
        <div>
            <a th:href="@{/demandes/{id}/edit(id=${demande.id})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Modifier
            </a>
            <a th:href="@{/demandes}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour
            </a>
        </div>
    </div>
    
    <div class="row">
        
        <!-- Informations Demande -->
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header bg-primary text-white">
                    <i class="bi bi-info-circle"></i> Informations
                </div>
                <div class="card-body">
                    <table class="table table-borderless">
                        <tr>
                            <th width="120">Date :</th>
                            <td th:text="${#temporals.format(demande.date, 'dd/MM/yyyy')}">-</td>
                        </tr>
                        <tr>
                            <th>Client :</th>
                            <td th:text="${demande.client?.nom}">-</td>
                        </tr>
                        <tr>
                            <th>Contact :</th>
                            <td th:text="${demande.client?.contact}">-</td>
                        </tr>
                        <tr>
                            <th>Lieu :</th>
                            <td th:text="${demande.lieu}">-</td>
                        </tr>
                        <tr>
                            <th>District :</th>
                            <td th:text="${demande.district}">-</td>
                        </tr>
                        <tr>
                            <th>Statut actuel :</th>
                            <td>
                                <span class="badge bg-info fs-6" th:text="${demande.dernierStatusLibelle}"></span>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
            
            <!-- Lien vers Devis -->
            <div class="card mb-3">
                <div class="card-header">
                    <i class="bi bi-receipt"></i> Devis
                </div>
                <div class="card-body">
                    <div th:if="${demande.devis != null}">
                        <p>Montant : <strong th:text="${demande.devis.montantTotal} + ' Ar'"></strong></p>
                        <a th:href="@{/devis/{id}(id=${demande.devis.id})}" class="btn btn-info">
                            <i class="bi bi-eye"></i> Voir le devis
                        </a>
                    </div>
                    <div th:if="${demande.devis == null}">
                        <p class="text-muted">Aucun devis créé</p>
                        <a th:href="@{/devis/new(demandeId=${demande.id})}" class="btn btn-success">
                            <i class="bi bi-plus"></i> Créer un devis
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Historique des Statuts -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <i class="bi bi-clock-history"></i> Historique des Statuts
                </div>
                <div class="card-body">
                    
                    <!-- Formulaire Ajouter Statut -->
                    <form th:action="@{/demandes/{id}/status(id=${demande.id})}" method="post" class="mb-4">
                        <div class="row g-2">
                            <div class="col-md-5">
                                <select name="statusId" class="form-select" required>
                                    <option value="">-- Nouveau statut --</option>
                                    <option th:each="s : ${statuses}" 
                                            th:value="${s.id}" 
                                            th:text="${s.libelle}"></option>
                                </select>
                            </div>
                            <div class="col-md-5">
                                <input type="text" name="commentaire" class="form-control" 
                                       placeholder="Commentaire (optionnel)">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                    
                    <hr>
                    
<!-- Section Historique des Statuts -->
<div class="col-md-7">
    <div class="card">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <span><i class="bi bi-clock-history"></i> Historique des Statuts</span>
            <button type="button" class="btn btn-light btn-sm" 
                    data-bs-toggle="modal" data-bs-target="#modalAjoutStatus">
                <i class="bi bi-plus"></i> Ajouter
            </button>
        </div>
        <div class="card-body">
            
            <div th:each="hs, iter : ${historiqueStatus}" class="mb-3">
                <div class="card" 
                     th:classappend="${hs.critique} ? 'border-danger' : (${hs.eleve} ? 'border-warning' : (${iter.first} ? 'border-success' : 'border-light'))">
                    <div class="card-body p-3"
                         th:classappend="${hs.critique} ? 'bg-danger bg-opacity-10' : (${hs.eleve} ? 'bg-warning bg-opacity-10' : '')">
                        
                        <!-- Ligne 1 : Status + Date -->
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge" 
                                  th:classappend="${iter.first} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${hs.status.libelle}"></span>
                            <small class="text-muted" 
                                   th:text="${#temporals.format(hs.dateStatus, 'dd/MM/yyyy HH:mm')}"></small>
                        </div>
                        
                        <!-- Ligne 2 : Durées -->
                        <div class="mt-2">
                            <small class="me-3">
                                <i class="bi bi-clock text-primary"></i>
                                Estimée: <strong th:text="${hs.dureeEstimer}"></strong>h
                            </small>
                            <small>
                                <i class="bi bi-briefcase text-success"></i>
                                Réelle: <strong th:text="${hs.dureeReel}"></strong>h
                                <span class="text-muted" 
                                      th:text="'(' + ${hs.dureeReel / 8} + 'j ' + ${hs.dureeReel % 8} + 'h)'">
                                </span>
                            </small>
                        </div>
                        
                        <!-- Ligne 3 : Indicateur -->
                        <div class="mt-2" th:if="${!hs.normal}">
                            <!-- Élevé -->
                            <span th:if="${hs.eleve}" class="badge" 
                                  style="background-color: #ffc107; color: #333;">
                                <i class="bi bi-exclamation-triangle"></i>
                                Élevé
                                <span th:if="${hs.indicateur != null}" 
                                      th:text="'(' + ${hs.plageIndicateur} + ')'"></span>
                            </span>
                            
                            <!-- Critique -->
                            <span th:if="${hs.critique}" class="badge" 
                                  style="background-color: #dc3545; color: white; animation: pulse 1.5s infinite;">
                                <i class="bi bi-x-octagon"></i>
                                CRITIQUE
                                <span th:if="${hs.indicateur != null}" 
                                      th:text="'(' + ${hs.plageIndicateur} + ')'"></span>
                            </span>
                        </div>
                        
                        <!-- Ligne 4 : Commentaire -->
                        <p class="mb-0 mt-2 small text-muted" 
                           th:if="${hs.commentaire != null && hs.commentaire != ''}" 
                           th:text="${hs.commentaire}"></p>
                    </div>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(historiqueStatus)}" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-1"></i><br>
                Aucun historique
            </div>
            
        </div>
    </div>
</div>

<style>
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
    }
</style>
                        
                        <div th:if="${#lists.isEmpty(historiqueStatus)}" class="text-muted text-center">
                            Aucun historique
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
        
    </div>
</div>
</body>
</html>
