<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Demande - Formulaire</title>
</head>
<body>
<div layout:fragment="content">
    <h2>
        <i class="bi bi-file-text"></i>
        <span th:text="${demande.id != 0 ? 'Modifier Demande' : 'Nouvelle Demande'}"></span>
    </h2>
    
    <div class="card">
        <div class="card-body">
            <form th:action="@{/demandes/save}" th:object="${demande}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Date *</label>
                        <input type="date" th:field="*{date}" class="form-control"
                               th:classappend="${#fields.hasErrors('date') ? 'is-invalid' : ''}">
                        <div class="invalid-feedback" th:errors="*{date}"></div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Client *</label>
                        <select th:field="*{client}" class="form-select"
                                th:classappend="${#fields.hasErrors('client') ? 'is-invalid' : ''}">
                            <option value="">-- Sélectionner --</option>
                            <option th:each="c : ${clients}" 
                                    th:value="${c.id}" 
                                    th:text="${c.nom}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{client}"></div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Lieu *</label>
                        <input type="text" th:field="*{lieu}" class="form-control"
                               th:classappend="${#fields.hasErrors('lieu') ? 'is-invalid' : ''}">
                        <div class="invalid-feedback" th:errors="*{lieu}"></div>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">District *</label>
                        <input type="text" th:field="*{district}" class="form-control"
                               th:classappend="${#fields.hasErrors('district') ? 'is-invalid' : ''}">
                        <div class="invalid-feedback" th:errors="*{district}"></div>
                    </div>
                </div>
                
                <!-- Statut initial - Nouvelle demande seulement -->
                <!-- ✅ Premier statut présélectionné par défaut -->
                <div class="mb-3" th:if="${demande.id == 0}">
                    <label class="form-label">Statut initial *</label>
                    <select name="statusId" class="form-select" required>
                        <option th:each="s, iter : ${statuses}" 
                                th:value="${s.id}" 
                                th:text="${s.libelle}"
                                th:selected="${iter.index == 0}">
                        </option>
                    </select>
                    <small class="text-muted">Le premier statut est sélectionné par défaut</small>
                </div>
                
                <div class="alert alert-info" th:if="${demande.id != 0}">
                    <i class="bi bi-info-circle"></i>
                    Pour changer le statut, allez dans la page de détail.
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check"></i> Enregistrer
                    </button>
                    <a th:href="@{/demandes}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
