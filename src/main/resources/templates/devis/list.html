<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Liste des Devis</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-receipt"></i> Devis</h2>
        <a th:href="@{/devis/new}" class="btn btn-primary">
            <i class="bi bi-plus"></i> Nouveau Devis
        </a>
        <a th:href="@{/}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Retour
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Client</th>
                        <th>Lieu</th>
                        <th>Type</th>
                        <th>Montant Total</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="devis : ${devisList}">
                        <td th:text="${devis.id}"></td>
                        <td th:text="${#temporals.format(devis.dateDevis, 'dd/MM/yyyy')}"></td>
                        <td th:text="${devis.demande?.client?.nom}"></td>
                        <td th:text="${devis.demande?.lieu}"></td>
                        <td th:text="${devis.typeDevis?.libelle}"></td>
                        <td>
                            <strong th:text="${#numbers.formatDecimal(devis.montantTotal, 0, 'COMMA', 0, 'POINT')} + ' Ar'"></strong>
                        </td>
                        <td>
                            <a th:href="@{/devis/{id}(id=${devis.id})}" class="btn btn-sm btn-info">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/devis/{id}/edit(id=${devis.id})}" class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/devis/{id}/delete(id=${devis.id})}" 
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Supprimer ce devis?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(devisList)}">
                        <td colspan="7" class="text-center text-muted">Aucun devis</td>
                    </tr>
                </tbody>
            </table>
            <h1>Total devis dans la base : </p></h1>
            <p th:text="${devisTotal}"></p>
        </div>
    </div>
</div>
</body>
</html>
