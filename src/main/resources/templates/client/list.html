<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Liste des Clients</title>
    
    <!-- CSS spécifique si nécessaire -->
    <style>
        /* Styles supplémentaires si besoin */
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-people"></i> Liste des Clients</h1>
        <a th:href="@{/clients/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Ajouter un nouveau client
        </a>
        <a th:href="@{/}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Retour
        </a>
    </div>
    
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Id</th>
                        <th>Nom</th>
                        <th>Contact</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="client : ${clients}">
                        <td th:text="${client.id}"></td>
                        <td th:text="${client.nom}"></td>
                        <td th:text="${client.contact}"></td>
                        <td>
                            <a th:href="@{/clients/edit/{id}(id=${client.id})}" class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i> Editer
                            </a>
                            <a th:href="@{/clients/delete/{id}(id=${client.id})}" 
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce client ?')">
                                <i class="bi bi-trash"></i> Supprimer
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${clients.isEmpty()}">
                        <td colspan="4" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-1"></i><br>
                            Aucun client trouvé
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
