<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Détails - Client</title>
    
    <!-- CSS spécifique si nécessaire -->
    <style>
        /* Styles supplémentaires si besoin */
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-person-badge"></i> Détails du Client</h1>
        <div>
            <a th:href="@{/clients}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour à la liste
            </a>
            <a th:href="@{/clients/edit/{id}(id=${client.id})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Modifier
            </a>
        </div>
    </div>
    
    <div class="card">
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">ID :</div>
                <div class="col-md-9" th:text="${client.id}">-</div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">Nom :</div>
                <div class="col-md-9" th:text="${client.nom}">-</div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">Contact :</div>
                <div class="col-md-9" th:text="${client.contact}">-</div>
            </div>
            <div class="row mt-4">
                <div class="col-12">
                    <a th:href="@{/demandes/{id}/view_by_client(id=${client.id})}" class="btn btn-info">
                        <i class="bi bi-file-text"></i> Voir les demandes de ce client
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
