<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Modifier Indicateur</title>
    <style>
        .level-card {
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .level-card:hover { transform: translateY(-3px); }
        .level-card.selected-eleve { border-color: #ffc107; background-color: #fff3cd; }
        .level-card.selected-critique { border-color: #dc3545; background-color: #f8d7da; }
        .level-card .icon { font-size: 2rem; margin-bottom: 10px; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-pencil"></i> Modifier Indicateur</h2>
        <a th:href="@{/indicateurs}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Retour
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning">Modification</div>
                <div class="card-body">
                    <form th:action="@{/indicateurs/update}" method="post" id="indicForm">
                        
                        <input type="hidden" name="indicateurId" th:value="${indicateur.id}">
                        
                        <!-- Status -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Status Début *</label>
                                <select name="statusDebutId" class="form-select" required>
                                    <option value="">-- Sélectionner --</option>
                                    <option th:each="s : ${statuses}"
                                            th:value="${s.id}"
                                            th:text="${s.libelle}"
                                            th:selected="${indicateur.statusDebut.id == s.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Status Fin *</label>
                                <select name="statusFinId" class="form-select" required>
                                    <option value="">-- Sélectionner --</option>
                                    <option th:each="s : ${statuses}"
                                            th:value="${s.id}"
                                            th:text="${s.libelle}"
                                            th:selected="${indicateur.statusFin.id == s.id}"></option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Choix du niveau -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Niveau *</label>
                            <input type="hidden" name="level" id="levelInput" 
                                   th:value="${indicateur.level}">
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="level-card" id="cardEleve" 
                                         onclick="selectLevel('eleve')"
                                         th:classappend="${indicateur.level == 'eleve'} ? 'selected-eleve' : ''">
                                        <div class="icon" style="color: #ffc107;">
                                            <i class="bi bi-exclamation-triangle-fill"></i>
                                        </div>
                                        <h5>Élevé</h5>
                                        <small class="text-muted">Alerte jaune</small>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="level-card" id="cardCritique" 
                                         onclick="selectLevel('critique')"
                                         th:classappend="${indicateur.level == 'critique'} ? 'selected-critique' : ''">
                                        <div class="icon" style="color: #dc3545;">
                                            <i class="bi bi-x-octagon-fill"></i>
                                        </div>
                                        <h5>Critique</h5>
                                        <small class="text-muted">Alerte rouge</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Heures -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Heure début (h) *</label>
                                <input type="number" name="heure1" class="form-control"
                                       min="0" th:value="${indicateur.heure1}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Heure fin (h) *</label>
                                <input type="number" name="heure2" class="form-control"
                                       min="1" th:value="${indicateur.heure2}" required>
                            </div>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check"></i> Sauvegarder
                            </button>
                            <a th:href="@{/indicateurs}" class="btn btn-secondary">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function selectLevel(level) {
        document.getElementById('levelInput').value = level;
        document.getElementById('cardEleve').className = 'level-card';
        document.getElementById('cardCritique').className = 'level-card';
        
        if (level === 'eleve') {
            document.getElementById('cardEleve').className = 'level-card selected-eleve';
        } else {
            document.getElementById('cardCritique').className = 'level-card selected-critique';
        }
    }
    
    document.getElementById('indicForm').addEventListener('submit', function(e) {
        if (!document.getElementById('levelInput').value) {
            e.preventDefault();
            alert('Veuillez choisir un niveau');
        }
    });
</script>
</body>
</html>
