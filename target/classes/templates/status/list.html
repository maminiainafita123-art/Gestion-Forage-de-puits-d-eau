<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Liste des Status</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-flag"></i> Status</h2>
        <a th:href="@{/status/new}" class="btn btn-primary">
            <i class="bi bi-plus"></i> Nouveau Status
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th width="80">ID</th>
                        <th>Libellé</th>
                        <th width="150">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="status : ${statuses}">
                        <td th:text="${status.id}"></td>
                        <td>
                            <span class="badge bg-secondary fs-6" th:text="${status.libelle}"></span>
                        </td>
                        <td>
                            <a th:href="@{/status/{id}/edit(id=${status.id})}" 
                               class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i> Modifier
                            </a>
                            <a th:href="@{/status/{id}/delete(id=${status.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Supprimer ce status ?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(statuses)}">
                        <td colspan="3" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-1 d-block"></i>
                            Aucun status
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
