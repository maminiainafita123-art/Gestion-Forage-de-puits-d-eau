<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Status - Formulaire</title>
</head>
<body>
<div layout:fragment="content">

    <h2>
        <i class="bi bi-flag"></i>
        <span th:text="${isNew} ? 'Nouveau Status' : 'Modifier Status'"></span>
    </h2>

    <div class="card mt-3">
        <div class="card-header" th:classappend="${isNew} ? 'bg-primary text-white' : 'bg-warning'">
            <span th:text="${isNew} ? 'Création' : 'Modification'"></span>
        </div>
        <div class="card-body">
            <form th:action="@{/status/save}" th:object="${status}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label fw-bold">Libellé *</label>
                    <input type="text" th:field="*{libelle}" class="form-control form-control-lg"
                           th:classappend="${#fields.hasErrors('libelle')} ? 'is-invalid' : ''"
                           placeholder="Ex: En attente, Validé, En cours...">
                    <div class="invalid-feedback" th:errors="*{libelle}"></div>
                    <small class="text-muted">Le libellé doit être unique</small>
                </div>

                <!-- Aperçu du badge -->
                <div class="mb-3">
                    <label class="form-label">Aperçu :</label><br>
                    <span class="badge bg-secondary fs-6" id="preview">
                        <span th:text="${status.libelle != null && status.libelle != ''} ? ${status.libelle} : 'Libellé...'"></span>
                    </span>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-check"></i> Enregistrer
                    </button>
                    <a th:href="@{/status}" class="btn btn-secondary btn-lg">
                        <i class="bi bi-x"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Aperçu en temps réel
    document.querySelector('input[name="libelle"]').addEventListener('input', function() {
        document.getElementById('preview').textContent = this.value || 'Libellé...';
    });
</script>
</body>
</html>
