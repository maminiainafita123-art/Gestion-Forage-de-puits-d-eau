<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Détails Devis</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-receipt"></i> Devis #<span th:text="${devis.id}"></span></h2>
        <div>
            <a th:href="@{/devis/{id}/edit(id=${devis.id})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Modifier
            </a>
            <a th:href="@{/devis}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour
            </a>
        </div>
    </div>
    
    <div class="row">
        <!-- Informations -->
        <div class="col-md-4">
            <div class="card mb-3">
                <div class="card-header bg-primary text-white">Informations</div>
                <div class="card-body">
                    <p><strong>Date:</strong> <span th:text="${#temporals.format(devis.dateDevis, 'dd/MM/yyyy')}"></span></p>
                    <p><strong>Type:</strong> <span th:text="${devis.typeDevis?.libelle}"></span></p>
                    <hr>
                    <p><strong>Client:</strong> <span th:text="${devis.demande?.client?.nom}"></span></p>
                    <p><strong>Lieu:</strong> <span th:text="${devis.demande?.lieu}"></span></p>
                    <p><strong>District:</strong> <span th:text="${devis.demande?.district}"></span></p>
                </div>
            </div>
            
            <div class="card bg-success text-white">
                <div class="card-body text-center">
                    <h5>Montant Total</h5>
                    <h2 th:text="${#numbers.formatDecimal(devis.montantTotal, 0, 'COMMA', 0, 'POINT')} + ' Ar'"></h2>
                </div>
            </div>
        </div>
        
        <!-- Détails -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">Détails du Devis</div>
                <div class="card-body">
                    <table class="table">
                        <thead class="table-light">
                            <tr>
                                <th>Libellé</th>
                                <th class="text-end">Prix Unitaire</th>
                                <th class="text-center">Qté</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d : ${details}">
                                <td th:text="${d.libelle}"></td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(d.prixUnitaire, 0, 'COMMA', 0, 'POINT')} + ' Ar'"></td>
                                <td class="text-center" th:text="${d.quantite}"></td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(d.total, 0, 'COMMA', 0, 'POINT')} + ' Ar'"></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr class="table-success">
                                <th colspan="3" class="text-end">TOTAL:</th>
                                <th class="text-end" th:text="${#numbers.formatDecimal(devis.montantTotal, 0, 'COMMA', 0, 'POINT')} + ' Ar'"></th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
